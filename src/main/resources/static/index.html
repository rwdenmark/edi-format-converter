<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>EDI Format Converter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --bg: #120f18; --panel: #1a1626; --border: #322a44;
            --text: #dad6e6; --muted: #948aa8; --accent: #a78bfa; --error: #ff7b72;
            --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        }
        * { box-sizing: border-box; }
        html { color-scheme: dark; }
        body { margin: 0; background: var(--bg); color: var(--text);
            font: 17.5px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        header { padding: 12.5px 30px; border-bottom: 1px solid var(--border);
            display: flex; align-items: baseline; gap: 15px; flex-wrap: wrap; }
        header h1 { margin: 0; font-size: 22.5px; font-weight: 600; }
        .samplebar { display: flex; align-items: center; gap: 10px; padding: 12.5px 30px;
            border-bottom: 1px solid var(--border); flex-wrap: wrap; }
        .samplebar .lbl { font-size: 15px; color: var(--muted); display: inline-block; width: 62px; }
        .sample.active { background: #332b46; color: var(--text); border-color: var(--border); font-weight: 600; }
        main { display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
            padding: 0 30px 20px; height: calc(100vh - 176px); }
        .panel { background: var(--panel); border: 1px solid var(--border);
            border-radius: 10px; display: flex; flex-direction: column; min-height: 0; }
        .panel-head { padding: 12.5px 15px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        button { background: #251f33; color: var(--text); border: 1px solid var(--border);
            padding: 6.25px 12.5px; border-radius: 6px; font-size: 15px; cursor: pointer; }
        button:hover { border-color: var(--accent); }
        .fmtgroup { display: inline-flex; border: 1px solid var(--border); border-radius: 7.5px; overflow: hidden; }
        .fmtgroup button { border: none; border-right: 1px solid var(--border); border-radius: 0; padding: 6.25px 13.75px; }
        .fmtgroup button:last-child { border-right: none; }
        .fmtgroup button:hover { background: #2e2742; }
        .fmtgroup button.active { background: #332b46; color: var(--text); font-weight: 600; }
        .fmtchip { display: inline-flex; align-items: center; border: 1px solid var(--border);
            border-radius: 7.5px; padding: 6.25px 13.75px; font-size: 15px; line-height: normal; font-weight: 600;
            background: #332b46; color: var(--text); }
        textarea { flex: 1; margin: 0; padding: 17.5px; background: #201a2e; color: var(--text);
            border: none; outline: none; resize: none; font: 15px/1.55 var(--mono);
            white-space: pre-wrap; overflow-wrap: anywhere; overflow-x: hidden; overflow-y: auto; }
        .error { color: var(--error); }
        .spacer { flex: 1; }
        .status { font-size: 15px; color: var(--muted); }
        .dirbar { text-align: left; padding: 20px 30px; font: 16px var(--mono); color: var(--muted); }
        @media (max-width: 900px) {
            main { grid-template-columns: 1fr; height: auto; }
            .panel { height: 48vh; }
        }
    </style>
</head>
<body>
<header>
    <h1>EDI Format Converter</h1>
</header>
<div class="samplebar">
    <span class="lbl">Samples:</span>
    <button class="sample" data-sample="837p">837P</button>
    <button class="sample" data-sample="837i">837I</button>
    <button class="sample" data-sample="837d">837D</button>
</div>
<div class="dirbar"><span id="direction"></span></div>
<main>
    <section class="panel">
        <div class="panel-head">
            <span class="fmtchip">Text</span>
            <div class="spacer"></div>
            <button id="clear">Clear</button>
        </div>
        <textarea id="source" spellcheck="false" placeholder="Paste X12, JSON, YAML, or XML here, or load a sample 837..."></textarea>
    </section>
    <section class="panel">
        <div class="panel-head">
            <div class="fmtgroup" id="dstFmt">
                <button data-fmt="X12">X12</button>
                <button data-fmt="JSON" class="active">JSON</button>
                <button data-fmt="YAML">YAML</button>
                <button data-fmt="XML">XML</button>
                <button data-fmt="STRING">STRING</button>
            </div>
            <div class="spacer"></div>
            <span id="status" class="status"></span>
            <button id="push" title="Move the result into the input box">&#8592; Push</button>
            <button id="copy">Copy</button>
        </div>
        <textarea id="result" readonly spellcheck="false"></textarea>
    </section>
</main>
<script>
    const source = document.getElementById("source");
    const result = document.getElementById("result");
    const status = document.getElementById("status");
    const direction = document.getElementById("direction");
    let srcFmt = "TEXT", dstFmt = "JSON";
    let timer = null;

    function updateDirection() { direction.textContent = srcFmt + " → " + dstFmt; }

    function setActive(groupId, fmt) {
        document.querySelectorAll("#" + groupId + " button").forEach(b =>
            b.classList.toggle("active", b.dataset.fmt === fmt));
    }

    function detectFormat(raw) {
        const t = raw.trim();
        if (!t) return "TEXT";
        if (t.startsWith("ISA")) return "X12";
        if (t[0] === "{" || t[0] === "[") return "JSON";
        if (t[0] === "\"") return "STRING";
        if (t[0] === "<") return "XML";
        if (/^---\s*$/m.test(t) || /^[ \t]*-[ \t]+\S/m.test(t) || /^[ \t]*[\w.\-]+[ \t]*:(\s|$)/m.test(t)) return "YAML";
        return "TEXT";
    }

    function friendlyError(text, statusCode) {
        let msg = text;
        try {
            const obj = JSON.parse(text);
            msg = obj.detail || obj.message || obj.error || text;
        } catch (e) { /* already plain text */ }
        return (msg && msg.trim()) ? msg : ("Conversion failed (HTTP " + statusCode + ").");
    }

    async function run() {
        const raw = source.value;
        srcFmt = detectFormat(raw);
        updateDirection();
        if (!raw.trim()) {
            result.value = ""; result.classList.remove("error"); status.textContent = ""; return;
        }
        if (srcFmt === "TEXT") {
            result.classList.add("error");
            result.value = "Couldn't detect the input format. Paste valid X12, JSON, YAML, or XML.";
            status.textContent = ""; return;
        }
        status.textContent = "Converting...";
        result.classList.remove("error");
        try {
            const resp = await fetch("api/convert?from=" + srcFmt + "&to=" + dstFmt, {
                method: "POST",
                headers: { "Content-Type": "text/plain" },
                body: raw,
            });
            const text = await resp.text();
            if (!resp.ok) {
                result.classList.add("error");
                result.value = friendlyError(text, resp.status);
                status.textContent = ""; return;
            }
            result.value = text;
            status.textContent = "";
        } catch (e) {
            result.classList.add("error");
            result.value = "Request failed: " + String(e);
            status.textContent = "";
        }
    }
    function runDebounced() { clearTimeout(timer); timer = setTimeout(run, 350); }

    document.querySelectorAll("#dstFmt button").forEach(b => b.addEventListener("click", () => {
        dstFmt = b.dataset.fmt; setActive("dstFmt", dstFmt); updateDirection(); run();
    }));
    source.addEventListener("input", runDebounced);

    document.querySelectorAll("[data-sample]").forEach(btn => btn.addEventListener("click", async () => {
        const id = btn.dataset.sample;
        const resp = await fetch("api/samples/" + id);
        source.value = await resp.text();
        document.querySelectorAll(".sample").forEach(x => x.classList.remove("active"));
        btn.classList.add("active");
        run();
    }));

    document.getElementById("clear").addEventListener("click", () => {
        source.value = ""; result.value = ""; result.classList.remove("error"); status.textContent = "";
        document.querySelectorAll(".sample").forEach(x => x.classList.remove("active"));
        srcFmt = "TEXT"; updateDirection();
    });
    document.getElementById("push").addEventListener("click", () => {
        if (!result.value || result.classList.contains("error")) return;
        source.value = result.value;
        document.querySelectorAll(".sample").forEach(x => x.classList.remove("active"));
        run();
    });
    document.getElementById("copy").addEventListener("click", async () => {
        if (!result.value) return;
        await navigator.clipboard.writeText(result.value);
        status.textContent = "Copied.";
    });

    updateDirection();
</script>
</body>
</html>

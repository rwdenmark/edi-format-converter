<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>X12 837 Parser</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --bg: #0f1115;
            --panel: #181b22;
            --border: #2a2f3a;
            --text: #d7dae3;
            --muted: #8a93a6;
            --accent: #6ea8fe;
            --error: #ff7b72;
            --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }
        header h1 { margin: 0; font-size: 18px; font-weight: 600; }
        header .muted { color: var(--muted); font-size: 13px; }
        main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding: 16px 24px;
            height: calc(100vh - 56px);
        }
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .panel-head {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .panel-head h2 { margin: 0; font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
        button, .btn {
            background: #232834;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
        }
        button:hover { border-color: var(--accent); }
        button.primary { background: var(--accent); color: #0f1115; border-color: var(--accent); font-weight: 600; }
        textarea, pre {
            flex: 1;
            margin: 0;
            padding: 14px;
            background: transparent;
            color: var(--text);
            border: none;
            outline: none;
            resize: none;
            font: 12px/1.55 var(--mono);
            white-space: pre;
            overflow: auto;
        }
        pre.error { color: var(--error); }
        .spacer { flex: 1; }
        .status { font-size: 12px; color: var(--muted); }
        @media (max-width: 900px) {
            main { grid-template-columns: 1fr; height: auto; }
            .panel { height: 50vh; }
        }
    </style>
</head>
<body>
<header>
    <h1>X12 837 Parser</h1>
    <span class="muted">Paste an 837 (P/I/D) on the left, JSON tree on the right.</span>
</header>
<main>
    <section class="panel">
        <div class="panel-head">
            <h2>Input</h2>
            <button data-sample="837p">Load 837P</button>
            <button data-sample="837i">Load 837I</button>
            <button data-sample="837d">Load 837D</button>
            <div class="spacer"></div>
            <button id="clear">Clear</button>
            <button id="parse" class="primary">Parse</button>
        </div>
        <textarea id="input" spellcheck="false" placeholder="ISA*00*..."></textarea>
    </section>
    <section class="panel">
        <div class="panel-head">
            <h2>Output</h2>
            <span id="status" class="status"></span>
            <div class="spacer"></div>
            <button id="copy">Copy JSON</button>
        </div>
        <pre id="output"></pre>
    </section>
</main>
<script>
    const input = document.getElementById("input");
    const output = document.getElementById("output");
    const status = document.getElementById("status");

    document.querySelectorAll("[data-sample]").forEach(btn => {
        btn.addEventListener("click", async () => {
            const id = btn.getAttribute("data-sample");
            const resp = await fetch(`/api/samples/${id}`);
            input.value = await resp.text();
            status.textContent = `Loaded ${id} sample.`;
        });
    });

    document.getElementById("clear").addEventListener("click", () => {
        input.value = "";
        output.textContent = "";
        output.classList.remove("error");
        status.textContent = "";
    });

    document.getElementById("parse").addEventListener("click", async () => {
        if (!input.value.trim()) { status.textContent = "Paste an 837 first."; return; }
        status.textContent = "Parsing...";
        output.classList.remove("error");
        try {
            const resp = await fetch("/api/parse", {
                method: "POST",
                headers: { "Content-Type": "text/plain" },
                body: input.value,
            });
            const text = await resp.text();
            if (!resp.ok) {
                output.classList.add("error");
                output.textContent = text;
                status.textContent = `HTTP ${resp.status}`;
                return;
            }
            const json = JSON.parse(text);
            output.textContent = JSON.stringify(json, null, 2);
            status.textContent = `Parsed as ${json.variant}.`;
        } catch (e) {
            output.classList.add("error");
            output.textContent = String(e);
            status.textContent = "Error";
        }
    });

    document.getElementById("copy").addEventListener("click", async () => {
        if (!output.textContent) return;
        await navigator.clipboard.writeText(output.textContent);
        status.textContent = "Copied.";
    });
</script>
</body>
</html>

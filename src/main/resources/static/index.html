<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>EDI Format Converter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --bg: #0f1115; --panel: #181b22; --border: #2a2f3a;
            --text: #d7dae3; --muted: #8a93a6; --accent: #6ea8fe; --error: #ff7b72;
            --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        }
        * { box-sizing: border-box; }
        html { color-scheme: dark; }
        body { margin: 0; background: var(--bg); color: var(--text);
            font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        header { padding: 16px 24px; border-bottom: 1px solid var(--border);
            display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
        header h1 { margin: 0; font-size: 18px; font-weight: 600; }
        header .muted { color: var(--muted); font-size: 13px; }
        .samplebar { display: flex; align-items: center; gap: 8px; padding: 10px 24px;
            border-bottom: 1px solid var(--border); flex-wrap: wrap; }
        .samplebar .lbl { font-size: 12px; color: var(--muted); display: inline-block; width: 62px; }
        .sample.active { background: #2e343f; color: var(--text); border-color: var(--border); font-weight: 600; }
        main { display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
            padding: 0 24px 16px; height: calc(100vh - 200px); }
        .panel { background: var(--panel); border: 1px solid var(--border);
            border-radius: 8px; display: flex; flex-direction: column; min-height: 0; }
        .panel-head { padding: 10px 12px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        button { background: #232834; color: var(--text); border: 1px solid var(--border);
            padding: 5px 10px; border-radius: 5px; font-size: 12px; cursor: pointer; }
        button:hover { border-color: var(--accent); }
        .fmtgroup { display: inline-flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
        .fmtgroup button { border: none; border-right: 1px solid var(--border); border-radius: 0; padding: 5px 11px; }
        .fmtgroup button:last-child { border-right: none; }
        .fmtgroup button:hover { background: #2a3140; }
        .fmtgroup button.active { background: #2e343f; color: var(--text); font-weight: 600; }
        textarea, pre { flex: 1; margin: 0; padding: 14px; background: #1e2530; color: var(--text);
            border: none; outline: none; resize: none; font: 12px/1.55 var(--mono);
            white-space: pre-wrap; overflow-wrap: anywhere; overflow-x: hidden; overflow-y: auto; }
        .error { color: var(--error); }
        .spacer { flex: 1; }
        .status { font-size: 12px; color: var(--muted); }
        .dirbar { text-align: left; padding: 16px 24px; font: 13px var(--mono); color: var(--muted); }
        @media (max-width: 900px) {
            main { grid-template-columns: 1fr; height: auto; }
            .panel { height: 48vh; }
        }
    </style>
</head>
<body>
<header>
    <h1>EDI Format Converter</h1>
</header>
<div class="samplebar">
    <span class="lbl">Samples:</span>
    <button class="sample" data-sample="837p">837P</button>
    <button class="sample" data-sample="837i">837I</button>
    <button class="sample" data-sample="837d">837D</button>
</div>
<div class="samplebar">
    <span class="lbl">Tools:</span>
    <button id="swap" title="Swap sides">Swap</button>
    <button id="clear">Clear</button>
    <div class="spacer"></div>
    <span id="status" class="status"></span>
    <button id="copy">Copy</button>
</div>
<div class="dirbar"><span id="direction">X12 &#8594; JSON</span></div>
<main>
    <section class="panel">
        <div class="panel-head">
            <div class="fmtgroup" id="srcFmt">
                <button data-fmt="X12" class="active">X12</button>
                <button data-fmt="JSON">JSON</button>
                <button data-fmt="YAML">YAML</button>
                <button data-fmt="XML">XML</button>
                <button data-fmt="STRING">STRING</button>
            </div>
            <div class="spacer"></div>
        </div>
        <textarea id="source" spellcheck="false" placeholder="Paste input here, or load a sample 837..."></textarea>
    </section>
    <section class="panel">
        <div class="panel-head">
            <div class="fmtgroup" id="dstFmt">
                <button data-fmt="X12">X12</button>
                <button data-fmt="JSON" class="active">JSON</button>
                <button data-fmt="YAML">YAML</button>
                <button data-fmt="XML">XML</button>
                <button data-fmt="STRING">STRING</button>
            </div>
            <div class="spacer"></div>
        </div>
        <textarea id="result" readonly spellcheck="false"></textarea>
    </section>
</main>
<script>
    const source = document.getElementById("source");
    const result = document.getElementById("result");
    const status = document.getElementById("status");
    const direction = document.getElementById("direction");
    let srcFmt = "X12", dstFmt = "JSON";
    let timer = null;

    function updateDirection() { direction.textContent = srcFmt + " \u2192 " + dstFmt; }

    function setActive(groupId, fmt) {
        document.querySelectorAll("#" + groupId + " button").forEach(b =>
            b.classList.toggle("active", b.dataset.fmt === fmt));
    }

    async function run() {
        if (!source.value.trim()) { result.value = ""; result.classList.remove("error"); status.textContent = ""; return; }
        status.textContent = "Converting...";
        result.classList.remove("error");
        try {
            const resp = await fetch("api/convert?from=" + srcFmt + "&to=" + dstFmt, {
                method: "POST",
                headers: { "Content-Type": "text/plain" },
                body: source.value,
            });
            const text = await resp.text();
            if (!resp.ok) {
                result.classList.add("error"); result.value = text;
                status.textContent = "HTTP " + resp.status; return;
            }
            result.value = text;
            status.textContent = "";
        } catch (e) {
            result.classList.add("error"); result.value = String(e); status.textContent = "Error";
        }
    }
    function runDebounced() { clearTimeout(timer); timer = setTimeout(run, 350); }

    document.querySelectorAll("#srcFmt button").forEach(b => b.addEventListener("click", () => {
        srcFmt = b.dataset.fmt; setActive("srcFmt", srcFmt); updateDirection(); run();
    }));
    document.querySelectorAll("#dstFmt button").forEach(b => b.addEventListener("click", () => {
        dstFmt = b.dataset.fmt; setActive("dstFmt", dstFmt); updateDirection(); run();
    }));
    source.addEventListener("input", runDebounced);

    document.querySelectorAll("[data-sample]").forEach(btn => btn.addEventListener("click", async () => {
        const id = btn.dataset.sample;
        const resp = await fetch("api/samples/" + id);
        source.value = await resp.text();
        document.querySelectorAll(".sample").forEach(x => x.classList.remove("active"));
        btn.classList.add("active");
        srcFmt = "X12"; setActive("srcFmt", "X12"); updateDirection();
        run();
    }));

    document.getElementById("clear").addEventListener("click", () => {
        source.value = ""; result.value = ""; result.classList.remove("error"); status.textContent = "";
        document.querySelectorAll(".sample").forEach(x => x.classList.remove("active"));
    });
    document.getElementById("swap").addEventListener("click", () => {
        [srcFmt, dstFmt] = [dstFmt, srcFmt];
        setActive("srcFmt", srcFmt); setActive("dstFmt", dstFmt); updateDirection();
        if (result.value && !result.classList.contains("error")) source.value = result.value;
        run();
    });
    document.getElementById("copy").addEventListener("click", async () => {
        if (!result.value) return;
        await navigator.clipboard.writeText(result.value);
        status.textContent = "Copied.";
    });
</script>
</body>
</html>
